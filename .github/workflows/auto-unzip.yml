name: Auto Unzip

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip and flatten
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          
          find . -name "*.zip" -type f | while read f; do
            # 解压到临时目录
            temp_dir="${f%.zip}_temp"
            unzip -o "$f" -d "$temp_dir"
            
            # 如果解压后只有一个文件夹，把内容上移一层
            subfolder=$(find "$temp_dir" -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$subfolder" ] && [ "$(find "$temp_dir" -mindepth 1 -maxdepth 1 | wc -l)" -eq 1 ]; then
              # 移动子文件夹内容到根目录
              mv "$subfolder"/* . 2>/dev/null || true
              mv "$subfolder"/.* . 2>/dev/null || true
              rmdir "$subfolder" 2>/dev/null || true
            else
              # 多个文件/文件夹，直接放根目录
              mv "$temp_dir"/* . 2>/dev/null || true
            fi
            
            # 清理
            rm -rf "$temp_dir"
            rm "$f"
          done
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git status
          git diff --staged --quiet || (git commit -m "Auto unzip: flatten folder structure" && git push)
